<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LANParty VC – Lobby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #050816;
      color: #f9fafb;
      margin: 0;
      padding: 2rem;
      max-width: 600px;
    }
    h1 { margin: 0 0 1rem 0; }
    .card {
      background: #0b1020;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
    }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
    }
    .pill {
      display: inline-block;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      background: #111827;
      font-size: 0.85rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>LANParty VC</h1>
    <p>Instant voice chat with everyone on the same network.</p>

    <div id="network" class="pill">Detecting network…</div>

    <button id="enterBtn" disabled>Enter Voice Room</button>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
