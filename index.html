<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LANParty VC – Lobby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #050816;
      color: #f9fafb;
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 600px;
    }
    h1 { margin: 0; font-size: 2rem; }
    .card {
      background: #0b1020;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
    }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
    }
    .pill {
      display: inline-block;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      background: #111827;
      font-size: 0.85rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>LANParty VC</h1>
    <p>Instant voice chat with everyone on the same network.</p>

    <div id="network" class="pill">Detecting network…</div>

    <button id="enterBtn" disabled>Enter Voice Room</button>
  </div>

  <script type="module">
    async function sha256(str) {
      const data = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return [...new Uint8Array(hash)]
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    async function detectNetwork() {
      try {
        const res = await fetch("https://api.ipify.org?format=json");
        const ip = (await res.json()).ip;
        const hash = await sha256(ip);

        document.getElementById("network").textContent =
          "Network fingerprint: " + hash.slice(0, 12) + "…";

        const btn = document.getElementById("enterBtn");
        btn.disabled = false;
        btn.onclick = () => {
          window.location.href = "talk.html?room=" + hash;
        };
      } catch (e) {
        document.getElementById("network").textContent =
          "Network detection failed";
      }
    }

    detectNetwork();
  </script>
</body>
</html>
