<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LANParty VC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="lp-body">
  <div class="lp-container">
    <h1 class="lp-title">LANParty VC</h1>
    <p class="lp-subtitle">Lightweight browser voice chat</p>

    <form id="join-form" class="lp-card">
      <label class="lp-label">
        Room ID
        <input id="room-id" class="lp-input" placeholder="e.g. lobby" required />
      </label>

      <label class="lp-label">
        Nickname
        <input id="nickname" class="lp-input" placeholder="e.g. Austin" required />
      </label>

      <button class="lp-button" type="submit">Join Room</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
