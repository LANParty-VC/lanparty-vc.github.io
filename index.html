<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LANParty VC – Lobby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #0b0b10;
      --bg-elevated: #111827;
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.15);
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --danger: #ef4444;
      --success: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .shell {
      width: 100%;
      max-width: 720px;
      background: linear-gradient(145deg, #020617 0%, #020617 40%, #111827 100%);
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.85),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      padding: 1.5rem 1.75rem 1.75rem;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .title-block h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0.03em;
    }
    .title-block p {
      margin: 0.25rem 0 0;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .badge {
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.4);
      font-size: 0.75rem;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
    }
    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
    }
    .card {
      background: radial-gradient(circle at top left, #111827 0, #020617 55%);
      border-radius: 14px;
      padding: 1.25rem 1.25rem 1.35rem;
      border: 1px solid rgba(31, 41, 55, 0.9);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }
    .network-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }
    .network-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(55, 65, 81, 0.9);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .network-pill span {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 0.78rem;
      color: #e5e7eb;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 0.7rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.15s ease, transform 0.08s ease,
        box-shadow 0.15s ease, opacity 0.15s ease;
      white-space: nowrap;
    }
    button.primary {
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: white;
      box-shadow:
        0 12px 30px rgba(79, 70, 229, 0.45),
        0 0 0 1px rgba(129, 140, 248, 0.4);
    }
    button.primary:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: none;
    }
    button.primary:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow:
        0 16px 40px rgba(79, 70, 229, 0.6),
        0 0 0 1px rgba(129, 140, 248, 0.6);
    }
    button.primary:not(:disabled):active {
      transform: translateY(0);
      box-shadow:
        0 8px 20px rgba(79, 70, 229, 0.4),
        0 0 0 1px rgba(129, 140, 248, 0.5);
    }
    .hint {
      margin-top: 0.75rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .hint strong {
      color: #e5e7eb;
      font-weight: 500;
    }
    @media (max-width: 600px) {
      .shell { padding: 1.25rem; }
      .row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="title-block">
        <h1>LANParty VC</h1>
        <p>Ibstant voice chat for everyone on your LAN.</p>
      </div>
      <div class="badge">
        <div class="badge-dot"></div>
        Edge‑powered signaling
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div class="network-label">Network fingerprint</div>
          <div id="network" class="network-pill">
            <span>Detecting…</span>
          </div>
        </div>
        <button id="enterBtn" class="primary" disabled>
          Enter voice room
        </button>
      </div>
      <div class="hint">
        Your IP never leaves the browser — only a hash is used to group devices
        into the same room.
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
