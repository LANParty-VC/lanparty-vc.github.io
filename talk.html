<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LANParty VC – Voice Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #050816;
      color: #f9fafb;
      margin: 0;
      padding: 2rem;
      max-width: 700px;
    }
    h1 { margin: 0 0 1rem 0; }
    .card {
      background: #0b1020;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
    }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 0.7rem 1.4rem;
      font-size: 0.95rem;
      cursor: pointer;
      margin-right: 0.5rem;
    }
    button.secondary {
      background: #111827;
      border: 1px solid #374151;
    }
    .pill {
      display: inline-block;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      background: #111827;
      font-size: 0.85rem;
      color: #9ca3af;
    }
    .peers {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .peer {
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      background: #111827;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .peer-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4ade80;
    }
    .log {
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      max-height: 200px;
      overflow-y: auto;
      background: #020617;
      border-radius: 8px;
      padding: 0.75rem;
      color: #9ca3af;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>LANParty VC – Voice Room</h1>
    <div id="roomId" class="pill"></div>

    <div style="margin-top: 1rem;">
      <button id="joinBtn">Join voice</button>
      <button id="leaveBtn" class="secondary" disabled>Leave</button>
      <button id="muteBtn" class="secondary" disabled>Mute</button>
      <button id="homeBtn" class="secondary">Back to Home</button>
      <span id="status" class="pill">Idle</span>
    </div>

    <div class="peers" id="peers"></div>
  </div>

  <div class="card">
    <h2 style="margin-top:0;">Debug log</h2>
    <div id="log" class="log"></div>
  </div>

  <script type="module" src="./talk.js"></script>
</body>
</html>
