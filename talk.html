<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LANParty VC – Call</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="lp-body">
  <div class="lp-container">

    <header class="lp-header">
      <div>
        <h1 class="lp-title" id="room-title">Room: …</h1>
        <p class="lp-subtitle" id="user-label"></p>
      </div>
      <button id="leave-btn" class="lp-button lp-button-danger">Leave</button>
    </header>

    <main class="lp-main">
      <section class="lp-card">
        <h2 class="lp-section-title">Participants</h2>
        <ul id="peers-list" class="lp-list"></ul>
      </section>

      <section class="lp-card">
        <h2 class="lp-section-title">Audio</h2>

        <div class="lp-audio-controls">
          <button id="mute-btn" class="lp-button lp-button-secondary">Mute</button>
          <button id="device-btn" class="lp-button lp-button-secondary">Switch Mic</button>
        </div>

        <p id="status" class="lp-status">Connecting…</p>
      </section>
    </main>

  </div>

  <script src="talk.js"></script>
</body>
</html>
